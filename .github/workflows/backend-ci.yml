name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "ml/layer1_aigen/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "ml/layer1_aigen/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies (CPU-only torch)
        run: |
          pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision
          pip install -r requirements.txt

      - name: Run test suite
        env:
          # No external services configured -> every analyzer runs its stub/fallback path.
          # This is intentional: CI proves the app boots and the fusion/orchestration logic is
          # correct, not that every third-party integration (Vertex, Sightengine, TruFor,
          # HF ensemble) is live -- those need real credentials this workflow doesn't have.
          CELERY_TASK_ALWAYS_EAGER: "true"
        run: python -m pytest -v
