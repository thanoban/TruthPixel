name: Backend Deploy

# Build the backend image on every push to main, always publish it to GitHub Container
# Registry (needs no extra setup -- uses the built-in GITHUB_TOKEN; validates the Docker build),
# then deploy to GCP Cloud Run IF all required GCP secrets are present. The deploy step is
# config-gated rather than required, matching this repo's pattern elsewhere: until Cloud Run,
# Artifact Registry, and Workload Identity Federation are configured, this workflow still runs
# green and reports that deployment was skipped.
#
# One-time setup to enable the Cloud Run deploy step:
#   PROJECT_ID=<your-gcp-project-id>
#   PROJECT_NUMBER=$(gcloud projects describe "$PROJECT_ID" --format='value(projectNumber)')
#   REGION=us-central1
#   REPO=truthpixel
#   SA_NAME=truthpixel-deployer
#   GITHUB_REPO=thanoban/TruthPixel
#
#   gcloud services enable artifactregistry.googleapis.com run.googleapis.com iamcredentials.googleapis.com --project="$PROJECT_ID"
#   gcloud artifacts repositories create "$REPO" --repository-format=docker --location="$REGION" --project="$PROJECT_ID"
#   gcloud iam service-accounts create "$SA_NAME" --project="$PROJECT_ID"
#   for ROLE in roles/run.admin roles/artifactregistry.writer roles/iam.serviceAccountUser; do
#     gcloud projects add-iam-policy-binding "$PROJECT_ID" \
#       --member="serviceAccount:${SA_NAME}@${PROJECT_ID}.iam.gserviceaccount.com" \
#       --role="$ROLE"
#   done
#   gcloud iam workload-identity-pools create github-pool --project="$PROJECT_ID" --location=global
#   gcloud iam workload-identity-pools providers create-oidc github-provider \
#     --project="$PROJECT_ID" --location=global --workload-identity-pool=github-pool \
#     --issuer-uri="https://token.actions.githubusercontent.com" \
#     --attribute-mapping="google.subject=assertion.sub,attribute.repository=assertion.repository" \
#     --attribute-condition="assertion.repository=='${GITHUB_REPO}'"
#   gcloud iam service-accounts add-iam-policy-binding \
#     "${SA_NAME}@${PROJECT_ID}.iam.gserviceaccount.com" --project="$PROJECT_ID" \
#     --role="roles/iam.workloadIdentityUser" \
#     --member="principalSet://iam.googleapis.com/projects/${PROJECT_NUMBER}/locations/global/workloadIdentityPools/github-pool/attribute.repository/${GITHUB_REPO}"
#
#   Add these repo secrets:
#     GCP_PROJECT_ID, GCP_REGION, GCP_ARTIFACT_REPO, CLOUD_RUN_SERVICE_NAME,
#     GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT.
#
# Runtime env vars such as DATABASE_URL, API_AUTH_ENABLED, ADMIN_API_TOKEN, CORS_ALLOW_ORIGINS,
# and storage/model keys are set on the Cloud Run service itself. See README.md and
# docs/CLOUD_RUN_SUPABASE.md. No .env file is baked into the image.

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/truthpixel-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: meta
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          docker build -f backend/Dockerfile -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
          echo "image=$IMAGE:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy-cloud-run:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
      GCP_ARTIFACT_REPO: ${{ secrets.GCP_ARTIFACT_REPO }}
      CLOUD_RUN_SERVICE_NAME: ${{ secrets.CLOUD_RUN_SERVICE_NAME }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4

      - id: config
        name: Check Cloud Run deployment configuration
        shell: bash
        run: |
          missing=()
          for name in GCP_PROJECT_ID GCP_REGION GCP_ARTIFACT_REPO CLOUD_RUN_SERVICE_NAME GCP_WORKLOAD_IDENTITY_PROVIDER GCP_SERVICE_ACCOUNT; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            printf 'Cloud Run deploy skipped; missing repo secrets: %s\n' "${missing[*]}"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - id: auth
        name: Authenticate to GCP
        if: steps.config.outputs.enabled == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        if: steps.config.outputs.enabled == 'true'

      - name: Configure Docker for Artifact Registry
        if: steps.config.outputs.enabled == 'true'
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - id: artifact
        name: Build and push Artifact Registry image
        if: steps.config.outputs.enabled == 'true'
        shell: bash
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REPO}/truthpixel-backend"
          docker build -f backend/Dockerfile -t "$IMAGE:${{ github.sha }}" .
          docker push "$IMAGE:${{ github.sha }}"
          echo "image=$IMAGE:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        if: steps.config.outputs.enabled == 'true'
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          region: ${{ env.GCP_REGION }}
          service: ${{ env.CLOUD_RUN_SERVICE_NAME }}
          image: ${{ steps.artifact.outputs.image }}
          flags: "--port=8000"
