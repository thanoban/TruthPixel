[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os

# sqlalchemy.url is intentionally NOT set here — env.py reads it from the app's own
# Settings (backend/app/config.py), the same DATABASE_URL every other part of the app
# uses, so there's exactly one source of truth for the DB connection instead of two
# (this file and .env) that can drift apart.

# No [loggers]/[handlers]/[formatters] sections: env.py deliberately does not call
# logging.config.fileConfig() against this file. That call reconfigures the ROOT
# logger's handlers, which — since init_db() runs Alembic on every app startup, not
# just standalone CLI invocations — would strip out whatever handler the app (or
# pytest's caplog) already installed on root. See the comment in env.py for the
# incident this caused. Alembic's own loggers still work fine without it; they just
# propagate to root and use whatever handler is already there.
